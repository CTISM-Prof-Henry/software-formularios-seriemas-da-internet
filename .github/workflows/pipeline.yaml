name: CI/CD Pipeline

on:
  push:
    branches: [main, att]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/frontend

jobs:
  # ───────────────────────────
  # JOB 1: Testes do Backend
  # ───────────────────────────
  test-backend:
    name: Testes Django
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: back
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar testes
        run: python manage.py test --verbosity=2
        env:
          DJANGO_SETTINGS_MODULE: mysite.settings

  # ───────────────────────────
  # JOB 2: Testes do Frontend
  # ───────────────────────────
  test-frontend:
    name: Testes React
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: front/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Build de validação
        run: npm run build

  # ───────────────────────────────
  # JOB 3: Build e push das imagens
  # ───────────────────────────────
  build-and-push:
    name: Build Docker + Push
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./back
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build e push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./front
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ───────────────────────────
  # JOB 4: Deploy no Kubernetes
  # ───────────────────────────
  deploy:
    name: Deploy no minikube
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configurar kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config

      - name: Aplicar manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/secrets.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/db-deployment.yaml
          kubectl apply -f k8s/backend-deployment.yaml
          kubectl apply -f k8s/frontend-deployment.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Atualizar imagens
        run: |
          kubectl set image deployment/backend \
            backend=${{ env.BACKEND_IMAGE }}:${{ github.sha }} -n gestor
          kubectl set image deployment/frontend \
            frontend=${{ env.FRONTEND_IMAGE }}:${{ github.sha }} -n gestor

      - name: Aguardar rollout
        run: |
          kubectl rollout status deployment/backend -n gestor --timeout=120s
          kubectl rollout status deployment/frontend -n gestor --timeout=120s