
services:

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]

      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 60s
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  backend:
    build: ./back
    ports:
      - "8000:8000"
#    volumes:
#      - ./back:/app
    environment:
      - PYTHONUNBUFFERED=1
      - DB_HOST=db
      - EMAIL_HOST_USER=${EMAIL_HOST_USER}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
    depends_on:
      - db
    networks:
      - app-network

  frontend:
    build: # ./front
      context: ./front
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
#    volumes:
#      - ./front:/app
#      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
    networks:
      - app-network

  docs:
    image: squidfunk/mkdocs-material
    container_name: mkdocs_docs
    ports:
      - "8080:8000"
    volumes:
      - ./docs-sistema:/docs

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
